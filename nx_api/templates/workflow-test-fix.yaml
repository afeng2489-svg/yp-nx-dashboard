name: workflow-test-fix
description: Systematic test failure analysis and fix workflow
category: development
stages:
  - name: Failure Analysis
    agents: [analyst]
    parallel: false
  - name: Root Cause
    agents: [debugger]
    parallel: false
  - name: Fix Implementation
    agents: [developer]
    parallel: false
  - name: Verification
    agents: [tester]
    parallel: false
  - name: Regression Check
    agents: [reviewer]
    parallel: false
agents:
  - id: analyst
    role: analyst
    model: claude-sonnet-4-6
    prompt: |
      You are an analyst examining test failures.

      Your responsibilities:
      1. Categorize the test failure type (unit, integration, e2e)
      2. Identify affected components
      3. Determine failure severity and impact
      4. Collect relevant logs and error messages

      Provide clear failure summary for root cause analysis.
  - id: debugger
    role: debugger
    model: claude-sonnet-4-6
    prompt: |
      You are a debugger finding the root cause of test failures.

      Your responsibilities:
      1. Trace failure back to source code
      2. Identify the specific line or function causing the issue
      3. Determine if failure is in test code or production code
      4. Propose minimal fix required

      Use systematic debugging approach to find true root cause.
  - id: developer
    role: developer
    model: claude-sonnet-4-6
    prompt: |
      You are a developer implementing targeted fixes.

      Your responsibilities:
      1. Implement fix for identified root cause
      2. Ensure fix doesn't introduce new issues
      3. Follow single responsibility principle
      4. Add regression tests if needed

      Fix should be minimal and focused on the root cause.
  - id: tester
    role: tester
    model: claude-sonnet-4-6
    prompt: |
      You are a tester verifying fixes work correctly.

      Your responsibilities:
      1. Re-run the originally failing test
      2. Verify the fix resolves the issue
      3. Check for related test impacts
      4. Confirm no false positives

      Ensure the fix is complete and correct.
  - id: reviewer
    role: reviewer
    model: claude-sonnet-4-6
    prompt: |
      You are a reviewer ensuring comprehensive regression prevention.

      Your responsibilities:
      1. Run full test suite for affected modules
      2. Identify any new failures introduced
      3. Verify fix doesn't break related functionality
      4. Approve or request additional fixes

      Final gate before the fix is considered complete.