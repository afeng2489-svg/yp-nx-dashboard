name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
          - linux

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build Tauri app
  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: macos
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: nx_dashboard
        run: npm ci

      - name: Build nx_api binary
        run: cargo build --release --bin nx_api --target ${{ matrix.target }}

      - name: Copy nx_api to release dir
        if: matrix.target != ''
        shell: bash
        run: |
          mkdir -p target/release
          src="target/${{ matrix.target }}/release/nx_api"
          # Windows appends .exe
          if [ "$RUNNER_OS" = "Windows" ]; then src="${src}.exe"; fi
          cp "$src" target/release/nx_api

      - name: Build Tauri app
        working-directory: nx_dashboard
        run: |
          if [ "${{ matrix.platform }}" == "windows" ]; then
            npm run tauri build -- --target ${{ matrix.target }}
          else
            npm run tauri build
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload artifact (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: nx-dashboard-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            nx_dashboard/src-tauri/target/release/bundle/macos/*.app
            nx_dashboard/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 5

      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: nx-dashboard-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            nx_dashboard/src-tauri/target/release/bundle/nsis/*.exe
            nx_dashboard/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 5

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: nx-dashboard-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            nx_dashboard/src-tauri/target/release/bundle/appimage/*.AppImage
            nx_dashboard/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 5

  # Create release package
  create-release:
    name: Create Release Package
    runs-on: ubuntu-latest
    needs: [build-tauri]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create macOS package
        run: |
          mkdir -p release/macos
          cp -r artifacts/nx-dashboard-macos-*/NX\ Dashboard.app release/macos/ 2>/dev/null || true
          cd release && tar -czvf ../NX-Dashboard-macOS.tar.gz macos

      - name: Create Windows package
        run: |
          mkdir -p release/windows
          cp artifacts/nx-dashboard-windows-*/*.exe release/windows/ 2>/dev/null || true
          cp artifacts/nx-dashboard-windows-*/*.msi release/windows/ 2>/dev/null || true
          cd release && tar -czvf ../NX-Dashboard-Windows.tar.gz windows

      - name: Create Linux package
        run: |
          mkdir -p release/linux
          cp artifacts/nx-dashboard-linux-*/*.AppImage release/linux/ 2>/dev/null || true
          cp artifacts/nx-dashboard-linux-*/*.deb release/linux/ 2>/dev/null || true
          cd release && tar -czvf ../NX-Dashboard-Linux.tar.gz linux

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            NX-Dashboard-macOS.tar.gz
            NX-Dashboard-Windows.tar.gz
            NX-Dashboard-Linux.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
