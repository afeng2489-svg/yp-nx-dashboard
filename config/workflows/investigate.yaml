name: investigate
version: "1.0"
description: "根因调查 - 5阶段 Iron Law 方法论。复现 bug、收集证据、验证假设、实施修复、生成报告。"

triggers:
  - type: manual
    inputs:
      target:
        type: string
        required: true
        description: "要调查的 bug 描述或相关文件路径"

variables:
  confidence: "0"
  root_cause: ""

agents:
  - id: investigator
    role: 根因调查员
    model: claude-sonnet-4-6
    prompt: |
      你是根因调查员，使用 Iron Law 方法论分析 bug。

      调查目标：{{target}}

      执行步骤：
      1. 解析目标，提取症状/期望行为/触发上下文
      2. 用 Grep、Read 工具定位问题代码
      3. 尝试找到触发条件
      4. 列出所有收集到的证据
      5. 提出假设并评估置信度

      ⚠️ 必须在回复最后两行输出（格式严格）：
      EXTRACT:root_cause=<一句话描述根因>
      EXTRACT:confidence=<0到1之间的小数，例如0.85>
    extract_vars:
      - name: root_cause
        pattern: "EXTRACT:root_cause=(.+)"
      - name: confidence
        pattern: "EXTRACT:confidence=([0-9.]+)"

  - id: pattern-analyzer
    role: 模式分析师
    model: claude-sonnet-4-6
    depends_on: [investigator]
    prompt: |
      基于调查结果进行模式分析。

      当前根因：{{root_cause}}
      置信度：{{confidence}}

      执行：
      1. 分析这类 bug 的常见根因模式
      2. 检查受影响范围（哪些模块可能受到影响）
      3. 判断是否是系统性问题还是单点问题
      4. 如果发现置信度应该调整，在末尾输出新值

      ⚠️ 如果需要调整置信度，最后一行输出：
      EXTRACT:confidence=<新值>
    extract_vars:
      - name: confidence
        pattern: "EXTRACT:confidence=([0-9.]+)"

  - id: hypothesis-tester
    role: 假设验证员
    model: claude-sonnet-4-6
    depends_on: [pattern-analyzer]
    prompt: |
      验证根因假设。

      根因：{{root_cause}}
      置信度：{{confidence}}

      执行：
      1. 设计最小化验证步骤
      2. 通过代码分析确认或推翻假设
      3. 如果推翻，提出新假设

      ⚠️ 最后输出：
      EXTRACT:confidence=<最终置信度>
    extract_vars:
      - name: confidence
        pattern: "EXTRACT:confidence=([0-9.]+)"

  - id: implementer
    role: 修复实施者
    model: claude-sonnet-4-6
    depends_on: [hypothesis-tester]
    prompt: |
      实施修复。

      已验证根因：{{root_cause}}

      执行：
      1. 确定最小化修复范围
      2. 实施代码修改
      3. 确保修复不引入新问题
      4. 更新受影响的测试

  - id: reporter
    role: 验证报告员
    model: claude-sonnet-4-6
    depends_on: [implementer]
    prompt: |
      生成最终验证报告。

      执行：
      1. 运行相关测试验证修复
      2. 检查无回归
      3. 输出报告：
         - 根因描述
         - 修复方案
         - 测试验证结果
         - 预防建议

stages:
  - name: investigation
    agents: [investigator]
    next:
      - condition: "confidence >= 0.7"
        goto: pattern-analysis
      - goto: re-investigation

  - name: re-investigation
    agents: [investigator]
    next:
      - goto: pattern-analysis

  - name: pattern-analysis
    agents: [pattern-analyzer]

  - name: hypothesis-testing
    agents: [hypothesis-tester]
    next:
      - condition: "confidence >= 0.5"
        goto: implementation
      - goto: investigation

  - name: implementation
    agents: [implementer]

  - name: verification
    agents: [reporter]
