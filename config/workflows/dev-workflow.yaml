# Feature Development Workflow

name: "dev-workflow"
version: "1.0"
description: "功能开发工作流 - 规划 → 实现 → 审查 → 测试四阶段自动化开发"

triggers:
  - type: manual
    inputs:
      feature_name:
        type: string
        required: true
        description: "要开发的功能名称"
      target:
        type: string
        required: true
        description: "目标项目路径或模块名"

variables:
  feature_name: ""
  target: ""

agents:
  - id: planner
    role: 架构师
    model: claude-sonnet-4-6
    prompt: |
      你是软件架构师，负责规划功能 "{{feature_name}}" 的实现方案。

      目标路径：{{target}}

      执行步骤：
      1. 读取目标路径下的相关代码文件（使用 Read、Glob 工具）
      2. 理解现有架构和代码风格
      3. 创建详细的技术设计文档，包含：
         - 模块结构设计
         - API 接口设计
         - 数据模型
         - 关键实现决策
         - 潜在风险和缓解方案

  - id: coder
    role: 开发工程师
    model: claude-sonnet-4-6
    depends_on: [planner]
    prompt: |
      你是开发工程师，负责实现功能 "{{feature_name}}"。

      目标路径：{{target}}
      架构设计：{{planner_output}}

      执行步骤：
      1. 按照架构设计方案实现功能（使用 Edit、Write 工具）
      2. 遵循现有代码风格和最佳实践
      3. 编写清晰、可维护的代码
      4. 添加必要的错误处理

  - id: reviewer
    role: 代码审查员
    model: claude-sonnet-4-6
    depends_on: [coder]
    prompt: |
      你是代码审查员，负责审查功能 "{{feature_name}}" 的实现质量。

      目标路径：{{target}}

      检查以下方面：
      - 代码质量和可读性
      - 安全漏洞（SQL 注入、XSS 等）
      - 性能问题
      - 错误处理完整性
      - 测试覆盖建议

  - id: tester
    role: 测试工程师
    model: claude-sonnet-4-6
    depends_on: [coder]
    prompt: |
      你是测试工程师，为功能 "{{feature_name}}" 编写测试。

      目标路径：{{target}}

      执行步骤：
      1. 编写单元测试（使用 Write 工具）
      2. 编写集成测试（如适用）
      3. 确保测试覆盖率 ≥ 80%
      4. 运行测试并确保通过（使用 Bash 工具）

stages:
  - name: 规划
    agents: [planner]

  - name: 实现
    agents: [coder]

  - name: 审查与测试
    agents: [reviewer, tester]
    parallel: true
    quality_gate:
      template: rust_default
      on_fail: retry
      max_retries: 3
