name: codify-style
version: "1.0"
description: "设计 Token 固化工作流 - 将 style_spec 写入 src/styles/tokens.css（CSS 自定义属性）和 tailwind.config.js（主题扩展），实现设计系统与代码的统一。"

triggers:
  - type: manual
    inputs:
      style_spec:
        type: string
        required: true
        description: "由 style-extract 工作流输出的设计 token JSON 字符串"
      tokens_css_path:
        type: string
        required: false
        description: "CSS 变量文件路径，默认为 src/styles/tokens.css"
      tailwind_config_path:
        type: string
        required: false
        description: "Tailwind 配置文件路径，默认为 tailwind.config.js"

variables:
  style_spec: "{}"
  tokens_css_path: "src/styles/tokens.css"
  tailwind_config_path: "tailwind.config.js"
  codify_complete: "false"

agents:
  - id: spec-parser
    role: 规格解析员
    model: claude-haiku-4-5-20251001
    prompt: |
      你是规格解析员。解析 style_spec 并验证必要字段。

      style_spec：{{style_spec}}
      tokens_css_path：{{tokens_css_path}}
      tailwind_config_path：{{tailwind_config_path}}

      解析任务：
      1. 解析 style_spec JSON（处理可能的转义字符）
      2. 验证必要字段存在：colors, typography, spacing, border_radius
      3. 列出所有提取到的 token 类别
      4. 检查目标文件是否已存在（使用 Read 工具）

      输出格式：
      ## 规格解析结果

      - JSON 解析：[成功/失败]
      - 包含字段：[字段列表]
      - 缺失字段：[如有]
      - tokens.css 已存在：[是/否]
      - tailwind.config.js 已存在：[是/否]

      ### 解析后的 tokens 摘要
      [各字段 token 数量统计]

  - id: css-token-generator
    role: CSS Token 生成师
    model: claude-sonnet-4-6
    depends_on: [spec-parser]
    prompt: |
      你是 CSS Token 生成师。将 style_spec 转换为 CSS 自定义属性文件。

      style_spec：{{style_spec}}
      解析结果：{{spec-parser_output}}

      生成规则：
      1. 所有 token 以 `--` 开头定义在 `:root` 选择器中
      2. 颜色命名规则：`--color-[name]`
      3. 字体命名规则：`--font-[name]`
      4. 间距命名规则：`--spacing-[n]`
      5. 圆角命名规则：`--radius-[name]`
      6. 阴影命名规则：`--shadow-[name]`
      7. 添加 dark mode 支持：`.dark` 类覆盖颜色变量（深色版本）
      8. 添加注释分组（/* Colors */, /* Typography */, 等）

      生成完整的 tokens.css 内容：

      ```css
      /* Design Tokens - Auto-generated by style-extract workflow */
      /* DO NOT EDIT MANUALLY - regenerate via codify-style workflow */

      :root {
        /* Colors */
        --color-primary: [hex];
        /* ... */

        /* Typography */
        --font-sans: [font-family];
        /* ... */

        /* Spacing */
        --spacing-1: [rem];
        /* ... */

        /* Border Radius */
        --radius-sm: [rem];
        /* ... */

        /* Shadows */
        --shadow-sm: [shadow];
        /* ... */
      }

      .dark {
        /* Dark mode color overrides */
        --color-background: [dark-hex];
        /* ... */
      }
      ```

  - id: tailwind-config-generator
    role: Tailwind 配置生成师
    model: claude-sonnet-4-6
    depends_on: [spec-parser]
    prompt: |
      你是 Tailwind 配置生成师。将 style_spec 转换为 Tailwind CSS 主题扩展配置。

      style_spec：{{style_spec}}
      解析结果：{{spec-parser_output}}

      生成规则：
      1. 使用 `theme.extend` 扩展（不覆盖默认主题）
      2. 颜色值引用 CSS 变量：`var(--color-primary)`（支持动态切换主题）
      3. 字体使用 CSS 变量引用
      4. 间距、圆角等使用 CSS 变量引用
      5. 包含 darkMode 配置（'class' 模式）
      6. 包含 content 路径配置

      生成完整的 tailwind.config.js 内容：

      ```javascript
      /** @type {import('tailwindcss').Config} */
      // Design System - Auto-generated by codify-style workflow
      // DO NOT EDIT color/spacing sections manually - regenerate via workflow

      module.exports = {
        darkMode: 'class',
        content: [
          './index.html',
          './src/**/*.{js,ts,jsx,tsx}',
        ],
        theme: {
          extend: {
            colors: {
              primary: 'var(--color-primary)',
              // ...
            },
            fontFamily: {
              sans: 'var(--font-sans)',
              mono: 'var(--font-mono)',
            },
            spacing: {
              // override spacing to match design tokens
            },
            borderRadius: {
              // ...
            },
            boxShadow: {
              // ...
            },
          },
        },
        plugins: [],
      }
      ```

  - id: file-writer
    role: 文件写入员
    model: claude-haiku-4-5-20251001
    depends_on: [css-token-generator, tailwind-config-generator]
    prompt: |
      你是文件写入员。将生成的配置文件写入文件系统。

      CSS Token 内容：{{css-token-generator_output}}
      Tailwind 配置内容：{{tailwind-config-generator_output}}
      tokens_css_path：{{tokens_css_path}}
      tailwind_config_path：{{tailwind_config_path}}

      执行步骤：
      1. 从 css-token-generator_output 提取 css 代码块
      2. 使用 Write 工具写入 {{tokens_css_path}}
      3. 从 tailwind-config-generator_output 提取 javascript 代码块
      4. 使用 Write 工具写入 {{tailwind_config_path}}
      5. 验证文件写入成功（使用 Read 工具读取首几行）

      输出格式：
      ## 文件写入结果

      - tokens.css 路径：{{tokens_css_path}}
      - tokens.css 写入：[成功/失败]
      - tailwind.config.js 路径：{{tailwind_config_path}}
      - tailwind.config.js 写入：[成功/失败]

      EXTRACT:codify_complete=true
    extract_vars:
      - name: codify_complete
        pattern: "EXTRACT:codify_complete=(true|false)"

stages:
  - name: 规格解析
    agents: [spec-parser]

  - name: 并行生成配置
    parallel: true
    agents: [css-token-generator, tailwind-config-generator]

  - name: 写入文件
    agents: [file-writer]
