name: generate
version: "1.0"
description: "UI 组件生成工作流 - 基于 style_spec 和组件描述，生成 React + Tailwind CSS 组件代码，支持多变体和响应式布局。"

triggers:
  - type: manual
    inputs:
      style_spec:
        type: string
        required: true
        description: "由 style-extract 工作流输出的设计 token JSON 字符串"
      component_description:
        type: string
        required: true
        description: "组件功能描述，例如：'带头像和操作按钮的用户卡片，支持 hover 状态'"
      component_name:
        type: string
        required: false
        description: "组件名称（PascalCase），默认由 AI 推断"
      output_path:
        type: string
        required: false
        description: "输出文件路径，默认为 src/components/<ComponentName>.tsx"

variables:
  style_spec: "{}"
  component_description: ""
  component_name: ""
  output_path: ""
  generate_complete: "false"
  component_path: ""

agents:
  - id: spec-analyzer
    role: 规格分析师
    model: claude-haiku-4-5-20251001
    prompt: |
      你是规格分析师。解析设计规格和组件需求。

      style_spec：{{style_spec}}
      component_description：{{component_description}}
      component_name：{{component_name}}
      output_path：{{output_path}}

      分析任务：
      1. 解析 style_spec JSON，提取关键 tokens：
         - 主色、文字色、背景色、边框色
         - 字体大小、字重
         - 间距基准值、圆角值
         - 常用阴影值
      2. 从 component_description 解析：
         - 组件类型（Card/Button/Input/Table/Modal/...）
         - 所需 props（数据、回调、状态）
         - 交互行为（hover/click/disabled/loading）
         - 视觉变体（primary/secondary/outline/ghost）
      3. 确定组件名称：如有 component_name 则使用，否则从描述推断
      4. 确定输出路径：如有 output_path 则使用，否则为 src/components/<name>.tsx

      输出格式：
      ## 组件规格解析

      - 组件名称：[ComponentName]
      - 组件类型：[type]
      - 输出路径：[path]

      ### Props 定义
      ```typescript
      interface [ComponentName]Props {
        // 详细 props 定义
      }
      ```

      ### 变体列表
      - [variant1]: [描述]
      - [variant2]: [描述]

      ### 交互行为
      - [行为1]
      - [行为2]

      ### 使用到的 Design Tokens
      - colors: [token 列表]
      - spacing: [token 列表]
      - typography: [token 列表]

  - id: component-generator
    role: 组件代码生成师
    model: claude-sonnet-4-6
    depends_on: [spec-analyzer]
    prompt: |
      你是组件代码生成师。生成高质量的 React + Tailwind CSS 组件。

      style_spec：{{style_spec}}
      component_description：{{component_description}}
      组件规格：{{spec-analyzer_output}}

      代码生成规则：
      1. 使用 TypeScript + React 函数组件
      2. Props 接口必须完整定义（不使用 any）
      3. 使用 Tailwind CSS 类名（不写内联 style）
      4. 使用 style_spec 中的颜色、间距时，通过 CSS 变量或 Tailwind 配置映射
      5. 支持响应式（使用 sm:/md:/lg: 前缀）
      6. 支持 dark mode（使用 dark: 前缀）
      7. 包含 hover/focus/active/disabled 状态
      8. 组件要完整可用（包含必要的 import）
      9. 不使用第三方 UI 库（shadcn/antd 等），纯原生实现
      10. 添加适当的 aria 属性保证可访问性

      生成内容：
      1. 完整的 .tsx 组件文件内容
      2. 简短的使用示例（10-20 行）

      输出格式：
      ## 组件代码

      ```tsx
      // 完整组件代码
      ```

      ## 使用示例

      ```tsx
      // 使用示例
      ```

  - id: code-reviewer
    role: 代码审查员
    model: claude-haiku-4-5-20251001
    depends_on: [component-generator]
    prompt: |
      你是代码审查员。审查生成的组件代码质量。

      生成的组件代码：{{component-generator_output}}

      审查清单：
      1. TypeScript 类型是否完整（无 any，无隐式 any）
      2. Props 是否都有合理的默认值或明确为必填
      3. 事件处理函数命名是否规范（onXxx 形式）
      4. Tailwind 类名是否合理（无冗余、无矛盾）
      5. 是否有明显的可访问性问题（缺少 aria-label 等）
      6. 是否存在 React key 警告隐患
      7. 组件是否过于复杂（>100行建议拆分）

      如有问题，给出修正建议（不需要重写整个组件，只说明问题点）。

      输出格式：
      ## 代码审查报告

      - 类型安全：[通过/需改进]
      - Props 设计：[通过/需改进]
      - 样式质量：[通过/需改进]
      - 可访问性：[通过/需改进]

      ### 发现的问题
      [如无问题，写"无明显问题"]

      ### 修正建议
      [如需修正，列出具体建议]

  - id: file-writer
    role: 文件写入员
    model: claude-haiku-4-5-20251001
    depends_on: [component-generator, code-reviewer]
    prompt: |
      你是文件写入员。将生成的组件代码写入文件系统。

      组件代码：{{component-generator_output}}
      审查报告：{{code-reviewer_output}}
      style_spec：{{style_spec}}
      output_path：{{output_path}}
      组件规格：{{spec-analyzer_output}}

      执行步骤：
      1. 从审查报告确认是否有阻断性问题（如有，输出错误并停止）
      2. 从 component-generator_output 提取 tsx 代码块
      3. 确定输出路径（从 spec-analyzer_output 或 output_path）
      4. 确保目标目录存在（如不存在，先记录需要创建）
      5. 使用 Write 工具将组件代码写入文件
      6. 输出写入结果

      输出格式：
      ## 文件写入结果

      - 文件路径：[实际写入路径]
      - 写入状态：[成功/失败]
      - 组件名称：[ComponentName]

      EXTRACT:component_path=[实际写入路径]
      EXTRACT:generate_complete=true
    extract_vars:
      - name: component_path
        pattern: "EXTRACT:component_path=(.+)"
      - name: generate_complete
        pattern: "EXTRACT:generate_complete=(true|false)"

stages:
  - name: 规格解析
    agents: [spec-analyzer]

  - name: 代码生成
    agents: [component-generator]

  - name: 代码审查
    agents: [code-reviewer]

  - name: 写入文件
    agents: [file-writer]
