# AI 模型配置文件示例
# 复制此文件为 ai_config.yaml 并填入您的配置

# 默认模型配置
default_model:
  model_id: "claude-sonnet-4-5"  # 模型标识符
  provider: "anthropic"            # 提供商: anthropic, openai, google, ollama
  max_tokens: 4096                 # 最大输出 token 数
  temperature: 0.7                  # 采样温度 (0.0 - 1.0)
  stop_sequences: []                # 停止序列

# API 配置
api_config:
  # Anthropic (Claude) 配置
  anthropic:
    api_key: "sk-ant-xxxxx"       # 您的 Anthropic API 密钥
    base_url: ""                   # 可选：自定义 API 端点
    organization_id: ""             # 可选：组织 ID
    timeout_secs: 120              # 请求超时时间(秒)

  # OpenAI (GPT-4) 配置
  openai:
    api_key: "sk-xxxxx"           # 您的 OpenAI API 密钥
    base_url: ""                   # 可选：自定义 API 端点 (如代理)
    organization_id: ""             # 可选：组织 ID
    timeout_secs: 120

  # Google (Gemini) 配置
  google:
    api_key: "xxxxx"              # 您的 Google API 密钥
    base_url: ""                   # 可选：自定义 API 端点
    organization_id: ""
    timeout_secs: 120

  # Ollama (本地模型) 配置
  ollama:
    api_key: ""                    # Ollama 通常不需要 API 密钥
    base_url: "http://localhost:11434"  # Ollama 服务地址
    organization_id: ""
    timeout_secs: 300             # 本地模型可能需要更长的超时

# 启用的提供商
enabled_providers:
  - anthropic
  - openai
  - google
  - ollama

# 其他可用模型列表 (可选，预定义配置)
additional_models:
  - model_id: "claude-opus-4-5"
    provider: "anthropic"
    max_tokens: 8192
    temperature: 0.7

  - model_id: "claude-haiku-4-5"
    provider: "anthropic"
    max_tokens: 4096
    temperature: 0.5

  - model_id: "gpt-4-turbo"
    provider: "openai"
    max_tokens: 4096
    temperature: 0.7

  - model_id: "gpt-3.5-turbo"
    provider: "openai"
    max_tokens: 4096
    temperature: 0.7

  - model_id: "gemini-pro"
    provider: "google"
    max_tokens: 8192
    temperature: 0.9

  - model_id: "llama3"
    provider: "ollama"
    max_tokens: 4096
    temperature: 0.8

  - model_id: "codellama"
    provider: "ollama"
    max_tokens: 4096
    temperature: 0.2
