# 实际进度（2026-04-30 盘点）
# ============================================================
actual_progress:
  backend: "90% — tracker/repository/routes/watcher 均已实现并注册"
  frontend: "30% — ArtifactsPanel 骨架存在但只有文件列表，缺预览/下载/分页/diff"
  tests: "50% — Rust 后端有测试，前端无测试"

# ============================================================
# 已完成的交付物
# ============================================================
