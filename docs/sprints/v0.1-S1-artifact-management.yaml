# ============================================================
# 剩余工作（4 个 task，估 4-5 天）
# ============================================================
remaining_tasks:
  - id: T1
    name: 文件预览功能
    priority: P0
    estimated_hours: 8
    description: |
      点击文件 → 弹出预览面板
      - Markdown 文件 (.md) → 渲染为 HTML 展示
      - 代码文件 (.rs/.ts/.tsx/.py/.go/.json/.yaml) → 语法高亮
      - 文本文件 → 纯文本展示
      - 二进制文件 → 显示 "[二进制文件] N MB" 不预览
      - 大文件 >5MB → 不加载内容，只显示元信息 + "下载查看"
    backend: |
      新增 GET /api/v1/executions/:id/artifacts/:path/preview
      返回 { ok, data: { content, mime_type, size_bytes, is_binary, truncated } }
    frontend: |
      ArtifactsPanel 增加 onClick → PreviewModal
      用 react-markdown 渲染 .md
      用 prism 或 highlight.js 做代码高亮

  - id: T2
    name: 二进制判断 + 大文件降级
    priority: P0
    estimated_hours: 4
    description: |
      根据文件扩展名和 MIME type 判断是否二进制
      二进制文件在列表中显示 🗄 图标 + 文件大小 + "[二进制文件]" 标签
      >5MB 文本文件也不加载内容，只显示元信息 + "下载查看"
    backend: |
      artifact_tracker 增加 detect_mime_type(path) 函数
      返回 MIME type 和 is_binary 标志

  - id: T3
    name: 执行列表产物数量 badge
    priority: P1
    estimated_hours: 4
    description: |
      ExecutionsPage 执行列表每行显示产物数量 badge
      如 "📦 12" 表示该次执行产生了 12 个产物
      点击 badge 直接打开详情弹窗的产物 tab

  - id: T4
    name: 分页加载
    priority: P2
    estimated_hours: 4
    description: |
      后端 API 支持 ?page=1&limit=50
      前端 ArtifactsPanel 底部 "加载更多" 按钮
      总数超过 50 时显示 "显示 1-50 / 共 N 个文件"

acceptance:
  - 跑一次包含写文件的工作流后，产物 tab 显示该次执行所有文件
  - 点击 .md 文件 → 渲染预览
  - 点击 .rs 文件 → 代码高亮
  - 点击 .png 文件 → 显示 "[二进制文件] 1.2 MB" 不崩溃
  - 文件多于 50 时分页加载
  - 二进制文件不预览，只显示大小

quality_gates:
  - cargo test --bin nx_api 全过
  - cargo clippy -- -D warnings 无 warning
  - npx tsc --noEmit 无 error

