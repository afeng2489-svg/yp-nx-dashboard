sprint_id: v3.3
status: completed
priority: P2
estimated_hours: 16
depends_on: [v3.2]

title: "Token/Cost 监控"
objective: |
  不知道花了多少钱，需要预算控制和成本可视化。

remaining_tasks:
  - id: TC1
    name: Token 计数接入
    priority: P0
    estimated_hours: 6
    description: |
      run_claude_interactive() 改用 --output-format stream-json
      解析每行 JSON 的 usage 字段：{ input_tokens, output_tokens }
      执行完成后更新 executions.total_tokens + total_cost_usd
      cost 计算：claude-sonnet-4-6 = $3/1M input + $15/1M output
    acceptance:
      - 执行完成后 executions 表有 token 数据
      - cost_usd 计算正确

  - id: TC2
    name: 预算告警
    priority: P1
    estimated_hours: 4
    description: |
      工作流 YAML 支持：
        budget_limit_usd: 1.00
      执行中超过 80% 时推送告警事件到前端
      超过 100% 时自动暂停执行，等用户确认继续
    acceptance:
      - 超预算时前端有告警提示
      - 超 100% 自动暂停

  - id: TC3
    name: Cost Dashboard
    priority: P2
    estimated_hours: 6
    description: |
      新页面 /cost：
        按天/工作流/agent 分组的 token 用量曲线（recharts 已装）
        总花费统计
        最贵的工作流 Top 5
    acceptance:
      - /cost 页面有数据
      - 图表正确显示历史用量

quality_gates:
  - cargo build 通过
  - 执行后 total_tokens 有值
  - /cost 页面正常加载
